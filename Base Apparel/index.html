<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <title>Base apparel</title>
  </head>
  <body>
    <div class="mainContainer">
      <div class="textWrapper">
        <div class="apparelLogo">
          <div class="circleLogo"></div>
          <span>BASE APPAREL</span>
        </div>

        <div class="comingSoon">
          <h1 class="heading-first-word">WE'RE</h1>
          <h2 class="heading-second">COMING SOON</h2>
        </div>

        <div class="fellowShoppers">
          Hello fellow shoppers! We're currently building our new fashion store.
          Add your email below to stay up-to-date with announcements and our
          launch deals.
        </div>

        <div class="emailSubscription">
          <input type="email" placeholder="Email address" />
          <button>
            <img src="/public/Path.png" alt="Subscribe icon" />
          </button>
        </div>
      </div>
      
      <div class="imageBox">
        <img
          src="public/Bitmap.png"
          alt="Image of a woman in an orange shirt"
        />
      </div>
    </div>
  </body>
</html>
